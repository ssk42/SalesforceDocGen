<template>
    <div class="slds-grid slds-gutters" style="min-height: 80vh;">

        <!-- Left Nav -->
        <div class="slds-col slds-size_1-of-5 slds-theme_shade" style="border-right: 1px solid #d8dde6;">
            <div class="slds-var-p-around_medium">
                <h1 class="slds-text-heading_medium slds-var-m-bottom_small">
                    <lightning-icon icon-name="standard:article" size="small" class="slds-var-m-right_x-small"></lightning-icon>
                    Admin Guide
                </h1>
            </div>
            <nav class="slds-nav-vertical" aria-label="Admin Guide Navigation">
                <div class="slds-nav-vertical__section">
                    <ul>
                        <template for:each={computedSections} for:item="sec">
                            <li key={sec.name} class={sec.cssClass}>
                                <a href="#" class="slds-nav-vertical__action" data-section={sec.name} onclick={handleSectionClick} aria-current={sec.ariaCurrent}>
                                    <lightning-icon icon-name={sec.icon} size="x-small" class="slds-var-m-right_x-small"></lightning-icon>
                                    {sec.label}
                                </a>
                            </li>
                        </template>
                    </ul>
                </div>
            </nav>
        </div>

        <!-- Content -->
        <div class="slds-col slds-size_4-of-5 slds-var-p-around_large" style="max-width: 900px; overflow-y: auto;">

            <!-- ==================== OVERVIEW ==================== -->
            <template if:true={isOverview}>
                <h2 class="slds-text-heading_large slds-var-m-bottom_medium">Welcome to DocGen</h2>
                <p class="slds-text-body_regular slds-var-m-bottom_medium">
                    DocGen is a 100% native Salesforce application for generating documents by merging live Salesforce data into Microsoft Word (.docx) and PowerPoint (.pptx) templates. It runs entirely on-platform with zero external dependencies.
                </p>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Key Capabilities</h3>
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_small">
                            <lightning-icon icon-name="utility:check" size="x-small" variant="success" class="slds-var-m-right_x-small"></lightning-icon>
                            <strong>Word &amp; PowerPoint</strong> template merge with live data
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_small">
                            <lightning-icon icon-name="utility:check" size="x-small" variant="success" class="slds-var-m-right_x-small"></lightning-icon>
                            <strong>PDF output</strong> via native Blob.toPdf()
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_small">
                            <lightning-icon icon-name="utility:check" size="x-small" variant="success" class="slds-var-m-right_x-small"></lightning-icon>
                            <strong>E-Signatures</strong> with audit trail and multi-signer support
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_small">
                            <lightning-icon icon-name="utility:check" size="x-small" variant="success" class="slds-var-m-right_x-small"></lightning-icon>
                            <strong>Bulk generation</strong> for hundreds of records at once
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_small">
                            <lightning-icon icon-name="utility:check" size="x-small" variant="success" class="slds-var-m-right_x-small"></lightning-icon>
                            <strong>Flow actions</strong> for automation and triggers
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_small">
                            <lightning-icon icon-name="utility:check" size="x-small" variant="success" class="slds-var-m-right_x-small"></lightning-icon>
                            <strong>Template versioning</strong> with rollback capability
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_small">
                            <lightning-icon icon-name="utility:check" size="x-small" variant="success" class="slds-var-m-right_x-small"></lightning-icon>
                            <strong>Document Authenticator</strong> with SHA-256 verification
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_small">
                            <lightning-icon icon-name="utility:check" size="x-small" variant="success" class="slds-var-m-right_x-small"></lightning-icon>
                            <strong>No external services</strong> — no HTTP callouts
                        </div>
                    </div>
                </div>

                <div class="slds-box slds-var-m-bottom_medium" style="background: linear-gradient(135deg, #FFF8E1 0%, #FFECB3 100%); border: 1px solid #FFD54F; border-radius: 8px;">
                    <div class="slds-grid slds-grid_vertical-align-center">
                        <div class="slds-col slds-grow">
                            <h3 class="slds-text-heading_small slds-var-m-bottom_x-small" style="color: #5D4037;">Buy Amanda a Coffee</h3>
                            <p style="color: #6D4C41;">DocGen is free and open-source. If it saves your org time or money, consider supporting continued development.</p>
                        </div>
                        <div class="slds-col slds-shrink slds-var-p-left_medium">
                            <a href="https://buymeacoffee.com/davemoudya" target="_blank" rel="noopener noreferrer" style="display: inline-block; background: #FFDD00; color: #000; font-weight: bold; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-size: 14px;">Buy a Coffee</a>
                        </div>
                    </div>
                </div>

                <div class="slds-box slds-theme_error slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">
                        <lightning-icon icon-name="utility:warning" size="x-small" variant="inverse" class="slds-var-m-right_x-small"></lightning-icon>
                        Required: Enable Blob.toPdf() Release Update
                    </h3>
                    <p class="slds-var-m-bottom_small">Before generating PDFs, you <strong>must</strong> enable the Spring '26 Release Update in your org. Without it, PDFs will show raw CSS text instead of formatted content, and images (including signatures) will not render.</p>
                    <p class="slds-var-m-bottom_small">Go to <a href="/lightning/setup/ReleaseUpdates/home" target="_blank"><strong>Setup &gt; Release Updates</strong></a> and enable <strong>"Use the Visualforce PDF Rendering Service for Blob.toPdf() Invocations"</strong>.</p>
                    <p class="slds-text-body_small">This is opt-in until Summer '26 when Salesforce enforces it for all orgs. See the <strong>Installation &amp; Setup</strong> section for full details.</p>
                </div>

                <div class="slds-box slds-theme_info slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">How It Works</h3>
                    <ol class="slds-list_ordered">
                        <li class="slds-var-p-bottom_x-small"><strong>Create a Template Record</strong> — Define the base Salesforce object and select the fields you need.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Upload a Word or PowerPoint file</strong> — Add merge tags like <code>&#123;Name&#125;</code> where you want data inserted.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Generate</strong> — From any record, click Generate to produce a merged document (DOCX, PPTX, or PDF).</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Optionally, send for signature</strong> — Route the generated document for e-signatures with a full audit trail.</li>
                    </ol>
                </div>

                <div class="slds-box slds-theme_shade">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Permission Sets</h3>
                    <p class="slds-var-m-bottom_small">Assign one of the following permission sets to your users:</p>
                    <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col">Permission Set</th>
                                <th scope="col">Purpose</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><strong>DocGen Admin</strong></td>
                                <td>Full access to all DocGen features including template management, setup, and all records.</td>
                            </tr>
                            <tr>
                                <td><strong>DocGen User</strong></td>
                                <td>Generate documents, view templates (read-only), and manage own signature requests.</td>
                            </tr>
                            <tr>
                                <td><strong>DocGen Guest Signature</strong></td>
                                <td>Assigned to the Salesforce Site guest user for public e-signature access. Do NOT assign to internal users.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </template>

            <!-- ==================== INSTALLATION & SETUP ==================== -->
            <template if:true={isInstallation}>
                <h2 class="slds-text-heading_large slds-var-m-bottom_medium">Installation &amp; Setup</h2>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Step 1: Install the Package</h3>
                    <p class="slds-var-m-bottom_small">Install DocGen using the package installation URL provided on the project's GitHub page. Choose "Install for Admins Only" to start, then assign permission sets as needed.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Step 2: Assign Permission Sets</h3>
                    <ol class="slds-list_ordered">
                        <li>Go to <strong>Setup &gt; Permission Sets</strong>.</li>
                        <li>Click <strong>DocGen Admin</strong> and assign it to administrators who will manage templates.</li>
                        <li>Click <strong>DocGen User</strong> and assign it to end-users who will generate documents.</li>
                    </ol>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Step 3: Add the Document Generator to Record Pages</h3>
                    <p class="slds-var-m-bottom_small">To let users generate documents from record pages:</p>
                    <ol class="slds-list_ordered">
                        <li>Navigate to a record page (e.g., Account) and click the gear icon &gt; <strong>Edit Page</strong>.</li>
                        <li>Drag the <strong>docGenRunner</strong> component onto the page layout.</li>
                        <li>Save and activate the page.</li>
                    </ol>
                    <p class="slds-text-body_small slds-text-color_weak">The Document Generator component automatically detects the record's object type and shows matching templates.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Step 4: Add Signature Sender (Optional)</h3>
                    <p class="slds-var-m-bottom_small">To enable e-signatures from record pages:</p>
                    <ol class="slds-list_ordered">
                        <li>Edit the record page in Lightning App Builder.</li>
                        <li>Drag the <strong>docGenSignatureSender</strong> component onto the page.</li>
                        <li>Save and activate.</li>
                    </ol>
                    <p class="slds-text-body_small slds-text-color_weak">Users will see recently generated documents and can send them for signature directly.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Step 5: Configure E-Signature Site (Optional)</h3>
                    <p class="slds-var-m-bottom_small">If you plan to use e-signatures, you need a Salesforce Site for the public signing page:</p>
                    <ol class="slds-list_ordered">
                        <li>Go to <strong>Setup &gt; Sites</strong> (search "Sites" in Quick Find).</li>
                        <li>If you don't have a Sites domain, register one (e.g., <code>docgen</code>).</li>
                        <li>Click <strong>New</strong> and configure:
                            <ul class="slds-list_dotted slds-var-m-left_medium">
                                <li>Site Label: <strong>DocGen Signatures</strong></li>
                                <li>Active Site Home Page: <strong>DocGenSignature</strong></li>
                                <li>Check <strong>Active</strong></li>
                            </ul>
                        </li>
                        <li>After saving, click <strong>Public Access Settings</strong>.</li>
                        <li>In the Guest User profile, add <strong>DocGenSignature</strong> to Enabled Visualforce Page Access.</li>
                        <li>Assign the <strong>DocGen Guest Signature</strong> permission set to the Site Guest User.</li>
                        <li>Copy the <strong>Site URL</strong> and paste it into the <strong>DocGen Setup</strong> tab.</li>
                    </ol>
                </div>

                <div class="slds-box slds-theme_error slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Required: Enable Updated Blob.toPdf() (Spring '26)</h3>
                    <p class="slds-var-m-bottom_small">This Release Update is <strong>required for all PDF generation</strong>, not just signatures. Without it, the old <code>Blob.toPdf()</code> engine does not understand <code>&lt;style&gt;</code> blocks or <code>&lt;img&gt;</code> tags — it dumps them as visible text in your PDF output. The updated engine uses the same Visualforce PDF rendering service (Flying Saucer) that powers <code>renderAs="pdf"</code>, giving you proper CSS, image, and font support.</p>
                    <p class="slds-var-m-bottom_small"><strong>To enable:</strong></p>
                    <ol class="slds-list_ordered">
                        <li>Go to <a href="/lightning/setup/ReleaseUpdates/home" target="_blank"><strong>Setup &gt; Release Updates</strong></a></li>
                        <li>Find <strong>"Use the Visualforce PDF Rendering Service for Blob.toPdf() Invocations"</strong></li>
                        <li>Click <strong>Get Started</strong> &gt; <strong>Enable</strong></li>
                    </ol>
                    <p class="slds-var-m-top_small"><strong>Without this:</strong> PDFs will contain raw CSS text instead of formatted content, and images (including signatures) will not render. This Release Update is opt-in until Summer '26 when Salesforce enforces it for all orgs.</p>
                    <p class="slds-var-m-top_small"><strong>Why signatures specifically need this:</strong> Signed PDFs are generated by the Automated Process user via Platform Events and Queueable Apex. This system user cannot access Visualforce pages, so there is no fallback — <code>Blob.toPdf()</code> with the Release Update is the only path.</p>
                </div>

                <div class="slds-box slds-theme_warning">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Important: E-Signature Security</h3>
                    <p>Signature links are secured with SHA-256 tokens and expire after 30 days. The guest user permission set is intentionally minimal — it only allows reading signature request records and creating audit trail entries. Never assign broader permissions to the Site guest user.</p>
                </div>
            </template>

            <!-- ==================== CREATING TEMPLATES ==================== -->
            <template if:true={isTemplates}>
                <h2 class="slds-text-heading_large slds-var-m-bottom_medium">Creating Templates</h2>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Template Manager Overview</h3>
                    <p class="slds-var-m-bottom_small">The <strong>Template Manager</strong> tab is your central hub. Here you can create, edit, version, share, and test templates.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Creating a New Template</h3>
                    <ol class="slds-list_ordered">
                        <li class="slds-var-p-bottom_x-small"><strong>Click the "New Template" tab</strong> in the Template Manager.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Step 1 — Details:</strong> Enter the template name, category (for organization), type (Word or PowerPoint), and output format (PDF or Native).</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Step 2 — Query Configuration:</strong> Select the base Salesforce object (e.g., Account, Opportunity, Quote). Use the visual builder to pick the fields you want available in your document. You can also add parent fields (e.g., Account.Owner.Name) and child relationships (e.g., OpportunityLineItems, Contacts).</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Step 3 — Finish:</strong> Click Create. The system will prompt you to upload your template file.</li>
                    </ol>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Editing a Template</h3>
                    <p class="slds-var-m-bottom_small">Click the row actions menu on any template and choose <strong>Edit</strong>. The edit modal has four tabs:</p>
                    <ul class="slds-list_dotted">
                        <li class="slds-var-p-bottom_x-small"><strong>Settings</strong> — Update name, category, type, output format, default status, and document title format.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Query Configuration</strong> — Modify the fields included in the query. Add/remove parent fields, child relationships, and configure WHERE, ORDER BY, and LIMIT clauses on child lists.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Template Tags</strong> — View all available merge tags with sample values from a test record. Use the copy buttons to grab tags for your template file. Select a <strong>Test Record ID</strong> here to see real data and to enable sample document generation.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Document &amp; History</strong> — Upload new template files and view version history. You can preview, download, or activate any previous version.</li>
                    </ul>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Saving: Details vs. New Version</h3>
                    <ul class="slds-list_dotted">
                        <li class="slds-var-p-bottom_x-small"><strong>Save Details</strong> — Updates the template record (name, category, query config, etc.) without creating a version snapshot. Use this for minor edits.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Save as New Version</strong> — Creates a versioned snapshot that includes the current query configuration AND the currently uploaded file. Use this whenever you upload a new template file or make significant query changes you may want to roll back.</li>
                    </ul>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Dynamic Document Titles</h3>
                    <p class="slds-var-m-bottom_small">In the Settings tab, use the <strong>Document Title Format</strong> field to create dynamic file names using merge tags:</p>
                    <p class="slds-var-m-bottom_small"><code>&#123;Name&#125;_Proposal_&#123;CreatedDate&#125;</code> would produce: <strong>Acme Corp_Proposal_2026-03-18.pdf</strong></p>
                    <p class="slds-text-body_small slds-text-color_weak">If left blank, the template name is used as the document title.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Default Templates</h3>
                    <p>Mark a template as <strong>Default</strong> in the Settings tab. When users open the Document Generator on a record page, the default template for that object is pre-selected. Only one template per object should be marked as default.</p>
                </div>

                <div class="slds-box slds-theme_shade">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Query Builder Limits</h3>
                    <p class="slds-var-m-bottom_small">DocGen runs entirely within Salesforce and is subject to <a href="https://developer.salesforce.com/docs/atlas.en-us.apexcode.meta/apexcode/apex_gov_limits.htm" target="_blank">Apex Governor Limits</a>. The Query Builder enforces these caps to keep your templates within safe operating bounds:</p>
                    <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-var-m-bottom_small">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col">Limit</th>
                                <th scope="col">Value</th>
                                <th scope="col">Why</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td>Parent fields</td><td>10 max</td><td>Each parent lookup (e.g., <code>Account.Owner.Name</code>) adds a relationship traversal to the SOQL query. Salesforce allows up to 5 levels of parent relationships per query, and more fields means more data loaded into memory. 10 keeps queries fast and readable.</td></tr>
                            <tr><td>Child relationships</td><td>5 max</td><td>Each child list (e.g., Contacts, OpportunityLineItems) becomes a <a href="https://developer.salesforce.com/docs/atlas.en-us.soql_sosl.meta/soql_sosl/sforce_api_calls_soql_relationships_query_using.htm" target="_blank">SOQL subquery</a>. Salesforce limits a single query to 20 subqueries per transaction. DocGen caps at 5 to leave room for other automation in your org and to keep heap usage manageable — each child list multiplies the amount of data loaded.</td></tr>
                            <tr><td>Total fields</td><td>60+ triggers warning</td><td>Every field value is held in memory during document generation. With 60+ fields across parent and child objects, the data footprint approaches the 6 MB synchronous heap limit — especially when generating PDFs (which hold the template, data, HTML, and output simultaneously). The warning doesn't block you, but watch for <code>LimitException: Apex heap size too large</code> errors.</td></tr>
                        </tbody>
                    </table>
                    <p class="slds-text-body_small slds-text-color_weak">These limits exist because Salesforce enforces strict memory and CPU budgets on every Apex transaction. DocGen's caps are conservative by design — they keep you safely within governor limits even when other automation (triggers, flows, validation rules) runs alongside document generation.</p>
                </div>
            </template>

            <!-- ==================== MERGE TAGS & SYNTAX ==================== -->
            <template if:true={isTags}>
                <h2 class="slds-text-heading_large slds-var-m-bottom_medium">Merge Tags &amp; Syntax</h2>

                <div class="slds-box slds-theme_warning slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">How Merge Tags Work</h3>
                    <p class="slds-var-m-bottom_small">DocGen uses <strong>plain text replacement</strong>. When a document is generated, each merge tag in your template is replaced with the corresponding field value from the Salesforce record. That's it — simple, predictable, and reliable.</p>
                    <p class="slds-text-title_bold slds-var-m-bottom_x-small">What this means in practice:</p>
                    <ul class="slds-list_dotted">
                        <li class="slds-var-p-bottom_x-small">Tags are replaced with <strong>plain text values only</strong>. They will not insert images, charts, or other media into your document. If you need an image in your output, place it directly in the Word/PowerPoint template file itself.</li>
                        <li class="slds-var-p-bottom_x-small">Tables do not dynamically expand or resize. If you need repeating rows, use <strong>loop tags</strong> (<code>&#123;#ListName&#125;</code> / <code>&#123;/ListName&#125;</code>) — each child record creates a new row by duplicating the row containing the loop tags.</li>
                        <li class="slds-var-p-bottom_x-small">Formatting (bold, font size, color) comes from your template, not from the data. The replaced text inherits whatever formatting the tag had in the original document.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Rich Text fields</strong> automatically preserve basic formatting (bold, italic, underline) and embedded images in Word and PDF output. See the <strong>Rich Text Fields</strong> section below for details.</li>
                    </ul>
                    <p class="slds-var-m-top_small slds-text-body_small"><strong>Tip:</strong> For standard text fields, design your template with final formatting in mind — the replacement value inherits whatever font/style the tag had. For Rich Text Area fields, the formatting comes from the data itself.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Basic Field Tags</h3>
                    <p class="slds-var-m-bottom_small">Place merge tags in your Word or PowerPoint template wherever you want Salesforce data to appear:</p>
                    <div class="slds-box slds-theme_shade slds-var-m-bottom_small">
                        <code>&#123;Name&#125;</code> — Inserts the record's Name field<br/>
                        <code>&#123;Account.Name&#125;</code> — Inserts a parent field value<br/>
                        <code>&#123;Owner.Email&#125;</code> — Inserts the record owner's email
                    </div>
                    <p class="slds-text-body_small slds-text-color_weak">Tags are case-sensitive and must match the API field names exactly. Use the Template Tags tab in the editor to copy the correct tags.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Child Record Loops</h3>
                    <p class="slds-var-m-bottom_small">To repeat rows in a table for child records (e.g., line items, contacts), use loop tags:</p>
                    <div class="slds-box slds-theme_shade slds-var-m-bottom_small">
                        <code>&#123;#OpportunityLineItems&#125;</code> — Start of loop<br/>
                        <code>&nbsp;&nbsp;&#123;Product2.Name&#125; | &#123;Quantity&#125; | &#123;UnitPrice&#125;</code><br/>
                        <code>&#123;/OpportunityLineItems&#125;</code> — End of loop
                    </div>
                    <p class="slds-var-m-bottom_small">In Word, place the loop start and end tags in the <strong>first cell of a table row</strong>. Each child record will generate a new row. In PowerPoint, the loop duplicates the content between the start and end tags.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Conditional Content</h3>
                    <p class="slds-var-m-bottom_small">Show or hide content based on field values:</p>
                    <div class="slds-box slds-theme_shade slds-var-m-bottom_small">
                        <code>&#123;%IsActive&#125;</code> — Content here only appears if IsActive is truthy<br/>
                        <code>&#123;%/IsActive&#125;</code> — End of conditional block
                    </div>
                    <p class="slds-text-body_small slds-text-color_weak">Conditional blocks work with boolean fields, or any field value that is non-null and non-empty.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Date Formatting</h3>
                    <p class="slds-var-m-bottom_small">Format date fields using pipe syntax:</p>
                    <div class="slds-box slds-theme_shade slds-var-m-bottom_small">
                        <code>&#123;CreatedDate|MM/dd/yyyy&#125;</code> — Outputs: 03/18/2026<br/>
                        <code>&#123;CloseDate|MMMM d, yyyy&#125;</code> — Outputs: March 18, 2026
                    </div>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Dynamic Images with the % Tag</h3>
                    <p class="slds-var-m-bottom_small">Use the <code>&#123;%FieldName&#125;</code> tag to dynamically insert images into your Word document from Salesforce data. This is the one exception to the "plain text only" rule — the <code>%</code> prefix tells DocGen to treat the field value as an image source.</p>

                    <div class="slds-box slds-theme_shade slds-var-m-bottom_small">
                        <code>&#123;%Company_Logo__c&#125;</code> — Insert image at default size (4" x 3")<br/>
                        <code>&#123;%Photo__c:200x150&#125;</code> — Insert image at 200px wide by 150px tall<br/>
                        <code>&#123;%Headshot__c:100x100&#125;</code> — Insert a 100x100px square image
                    </div>

                    <h4 class="slds-text-title_bold slds-var-m-top_small slds-var-m-bottom_x-small">Supported Image Sources</h4>
                    <p class="slds-var-m-bottom_small">The field value referenced by the <code>%</code> tag can be any of the following:</p>
                    <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-var-m-bottom_small">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col">Source Type</th>
                                <th scope="col">What to Store in the Field</th>
                                <th scope="col">Example</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><strong>ContentVersion ID</strong> (Recommended)</td>
                                <td>The 18-character ID of a ContentVersion record (starts with <code>068</code>). Upload the image as a Salesforce File and store the ID in a text field on your record.</td>
                                <td><code>068xx0000012345AAA</code></td>
                            </tr>
                            <tr>
                                <td><strong>Rich Text HTML</strong></td>
                                <td>A Rich Text Area field that contains an embedded image. DocGen extracts the <code>&lt;img&gt;</code> tag and resolves the Salesforce URL.</td>
                                <td>Any Rich Text Area field with an inserted image</td>
                            </tr>
                            <tr>
                                <td><strong>Base64 Data URI</strong></td>
                                <td>A base64-encoded image string with the data URI prefix.</td>
                                <td><code>data:image/png;base64,iVBOR...</code></td>
                            </tr>
                            <tr>
                                <td><strong>Raw Base64</strong></td>
                                <td>A long base64 string without a prefix (auto-detected).</td>
                                <td><code>iVBORw0KGgoAAAANSUhEU...</code></td>
                            </tr>
                            <tr>
                                <td><strong>Salesforce File URL</strong></td>
                                <td>A URL pointing to a Salesforce file (servlet or sfc pattern).</td>
                                <td><code>/sfc/servlet.shepherd/version/download/068...</code></td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="slds-box slds-theme_info slds-var-m-bottom_small">
                        <p><strong>Best practice:</strong> Use a <strong>ContentVersion ID</strong> stored in a custom text field. Upload your image as a Salesforce File, copy its ContentVersion ID, and store it in a field like <code>Company_Logo_CV__c</code>. Then use <code>&#123;%Company_Logo_CV__c:200x60&#125;</code> in your template. This approach is reliable for both DOCX and PDF output.</p>
                    </div>

                    <h4 class="slds-text-title_bold slds-var-m-top_small slds-var-m-bottom_x-small">Controlling Image Size</h4>
                    <p class="slds-var-m-bottom_small">Append <code>:WIDTHxHEIGHT</code> in pixels to the tag to control the rendered size:</p>
                    <ul class="slds-list_dotted slds-var-m-bottom_small">
                        <li><code>&#123;%Logo__c:300x80&#125;</code> — 300px wide, 80px tall</li>
                        <li><code>&#123;%Photo__c:150x150&#125;</code> — 150px square</li>
                        <li><code>&#123;%Banner__c&#125;</code> — No size specified, defaults to 4" x 3" (288x216 pixels)</li>
                    </ul>
                    <p class="slds-text-body_small slds-text-color_weak">Size is in pixels. The default (no size suffix) is 4 inches wide by 3 inches tall. For logos, a good starting point is <code>:200x60</code>. For headshots, try <code>:100x100</code>.</p>

                    <h4 class="slds-text-title_bold slds-var-m-top_small slds-var-m-bottom_x-small">Limitations</h4>
                    <ul class="slds-list_dotted">
                        <li>Image tags only work in <strong>Word (.docx)</strong> templates. PowerPoint templates skip image tags to avoid corrupting the file format.</li>
                        <li>External URLs (e.g., <code>https://example.com/logo.png</code>) cannot be fetched server-side because DocGen does not make HTTP callouts. Use a ContentVersion ID instead.</li>
                        <li>The image replaces the tag inline in the document. It does not resize table cells or page layout — design your template with the expected image dimensions in mind.</li>
                    </ul>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Static Images in Templates</h3>
                    <p class="slds-var-m-bottom_small">For images that are the same in every document (logos, watermarks, headers), just place them directly in your Word or PowerPoint file as normal images. DocGen preserves all embedded template images in the output — they are extracted and stored as ContentVersions for reliable rendering in both DOCX and PDF.</p>
                </div>

                <div class="slds-box slds-theme_default">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Signature Placeholders</h3>
                    <p class="slds-var-m-bottom_small">To mark where signatures should appear in a document, <strong>always include a role name</strong>:</p>
                    <div class="slds-box slds-theme_shade slds-var-m-bottom_small">
                        <code>&#123;#Signature_Buyer&#125;</code> — Where the buyer signs<br/>
                        <code>&#123;#Signature_Seller&#125;</code> — Where the seller signs<br/>
                        <code>&#123;#Signature_Witness&#125;</code> — Where the witness signs
                    </div>
                    <p class="slds-var-m-bottom_x-small"><strong>Best practice:</strong> Always use the <code>&#123;#Signature_RoleName&#125;</code> format — even for single-signer documents. This ensures consistent behavior and makes it easy to add more signers later.</p>
                    <p class="slds-text-body_small slds-text-color_weak">When the document is signed, the placeholder is replaced with the signer's handwritten signature image plus a timestamp.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Rich Text Fields</h3>
                    <p class="slds-var-m-bottom_small">When a merge tag references a <strong>Rich Text Area</strong> field, DocGen automatically detects the HTML content and preserves formatting in Word and PDF output. No special syntax is needed — just use the standard <code>&#123;FieldName&#125;</code> tag.</p>

                    <h4 class="slds-text-title_bold slds-var-m-top_small slds-var-m-bottom_x-small">What's Preserved (Word &amp; PDF)</h4>
                    <ul class="slds-list_dotted slds-var-m-bottom_small">
                        <li><strong>Bold</strong>, <em>italic</em>, and underline formatting</li>
                        <li>Paragraph structure (line breaks, paragraph separators)</li>
                        <li>Images embedded in the rich text field (Salesforce-hosted URLs are automatically resolved)</li>
                    </ul>

                    <h4 class="slds-text-title_bold slds-var-m-top_small slds-var-m-bottom_x-small">What's NOT Preserved</h4>
                    <ul class="slds-list_dotted slds-var-m-bottom_small">
                        <li>Font colors, font sizes, and font families</li>
                        <li>Text alignment (center, right, justify)</li>
                        <li>Bullet and numbered lists (rendered as plain text paragraphs)</li>
                        <li>Tables within the rich text field</li>
                        <li>Hyperlinks (text appears, but the link is not clickable)</li>
                    </ul>

                    <div class="slds-box slds-theme_shade slds-var-m-bottom_small">
                        <p><strong>PowerPoint:</strong> Rich text is stripped to plain text in <code>.pptx</code> output. Only Word and PDF preserve RTF formatting.</p>
                    </div>

                    <p class="slds-text-body_small slds-text-color_weak"><strong>How it works:</strong> DocGen detects HTML tags in the field value and converts them to native Word XML (bold, italic, underline runs, paragraph breaks). Images are extracted from <code>&lt;img&gt;</code> tags and embedded in the document. For PDF output, the same formatting carries through the DOCX-to-HTML-to-PDF pipeline.</p>
                </div>
            </template>

            <!-- ==================== GENERATING DOCUMENTS ==================== -->
            <template if:true={isGeneration}>
                <h2 class="slds-text-heading_large slds-var-m-bottom_medium">Generating Documents</h2>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">From a Record Page</h3>
                    <ol class="slds-list_ordered">
                        <li class="slds-var-p-bottom_x-small">Navigate to a record (e.g., an Account, Opportunity, or Quote).</li>
                        <li class="slds-var-p-bottom_x-small">Find the <strong>Document Generator</strong> component on the page.</li>
                        <li class="slds-var-p-bottom_x-small">Select a template from the dropdown (the default template is pre-selected).</li>
                        <li class="slds-var-p-bottom_x-small">Choose <strong>Download</strong> (saves to your computer) or <strong>Save to Record</strong> (attaches as a File on the record).</li>
                        <li class="slds-var-p-bottom_x-small">Click <strong>Generate Document</strong>.</li>
                    </ol>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Output Formats</h3>
                    <ul class="slds-list_dotted">
                        <li class="slds-var-p-bottom_x-small"><strong>Native (.docx / .pptx)</strong> — Preserves the original file format. Best for documents that recipients need to edit.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>PDF</strong> — Converts Word templates to PDF using Salesforce's native Blob.toPdf(). Best for finalized documents and those sent for signature. Note: PowerPoint templates always output as .pptx (PDF conversion is not supported for PPT).</li>
                    </ul>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Testing from the Template Manager</h3>
                    <p class="slds-var-m-bottom_small">You can generate a sample document without leaving the Template Manager:</p>
                    <ol class="slds-list_ordered">
                        <li>Open a template for editing.</li>
                        <li>Go to the <strong>Template Tags</strong> tab.</li>
                        <li>Select a <strong>Test Record ID</strong> using the record picker.</li>
                        <li>Click <strong>Generate Sample Document</strong> in the modal footer.</li>
                    </ol>
                    <p class="slds-text-body_small slds-text-color_weak">This is the fastest way to iterate on template design — make changes, re-upload, and test without navigating to a record page.</p>
                </div>

                <div class="slds-box slds-theme_shade">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">PDF Generation Notes</h3>
                    <ul class="slds-list_dotted">
                        <li>PDF generation runs asynchronously via a Queueable job. The UI polls for the result automatically.</li>
                        <li>Images from Rich Text fields render in PDFs when they are hosted on Salesforce URLs.</li>
                        <li>Complex Word formatting (multi-column layouts, text boxes) may not convert perfectly to PDF. Test your templates.</li>
                        <li>PDF timeout is approximately 60 seconds. Very large documents may time out.</li>
                    </ul>
                </div>
            </template>

            <!-- ==================== BULK GENERATION ==================== -->
            <template if:true={isBulk}>
                <h2 class="slds-text-heading_large slds-var-m-bottom_medium">Bulk Generation</h2>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Overview</h3>
                    <p>Generate documents for multiple records at once. Each record produces its own document, saved as a File (ContentVersion) attached to that record.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">How to Use</h3>
                    <ol class="slds-list_ordered">
                        <li class="slds-var-p-bottom_x-small">Go to the <strong>Bulk Generation</strong> tab.</li>
                        <li class="slds-var-p-bottom_x-small">Select a template from the dropdown.</li>
                        <li class="slds-var-p-bottom_x-small">Enter a <strong>filter condition</strong> (SOQL WHERE clause) to target specific records. For example: <code>Industry = 'Technology'</code> or <code>StageName = 'Closed Won' AND CloseDate = THIS_YEAR</code>.</li>
                        <li class="slds-var-p-bottom_x-small">Click <strong>Count Records</strong> to verify how many records will be processed.</li>
                        <li class="slds-var-p-bottom_x-small">Click <strong>Generate</strong> to start the batch job.</li>
                    </ol>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Saved Queries</h3>
                    <p class="slds-var-m-bottom_small">Save frequently used filter conditions for reuse. Click <strong>Save Query</strong> after entering your condition, give it a name, and load it later from the dropdown.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Visual Filter Builder</h3>
                    <p>Toggle from the text input to the <strong>visual filter builder</strong> for a point-and-click interface. Select fields, operators (equals, not equals, LIKE, greater than, less than, IN), and values. The builder generates the SOQL WHERE clause for you.</p>
                </div>

                <div class="slds-box slds-theme_shade">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Batch Job Monitoring</h3>
                    <p class="slds-var-m-bottom_small">Once submitted, the job appears in the <strong>Recent Jobs</strong> section. The page auto-refreshes every 5 seconds while a job is running. Each job shows:</p>
                    <ul class="slds-list_dotted">
                        <li>Status: Queued, Running, Completed, Failed, or Completed with Errors</li>
                        <li>Total records, success count, and error count</li>
                        <li>Start and completion timestamps</li>
                    </ul>
                </div>
            </template>

            <!-- ==================== E-SIGNATURES ==================== -->
            <template if:true={isSignatures}>
                <h2 class="slds-text-heading_large slds-var-m-bottom_medium">E-Signatures</h2>

                <div class="slds-box slds-theme_info slds-var-m-bottom_medium">
                    <p><strong>Prerequisite:</strong> You must configure a Salesforce Site before using e-signatures. See the <strong>Installation &amp; Setup</strong> section for step-by-step instructions.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">How Signatures Work (v1.4.0 — Template-Based Flow)</h3>
                    <ol class="slds-list_ordered">
                        <li class="slds-var-p-bottom_x-small"><strong>Create a template</strong> with signature placeholders (<code>&#123;#Signature_Buyer&#125;</code>, <code>&#123;#Signature_Seller&#125;</code>, etc.) alongside your regular merge fields and image tags.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Send for signature</strong> using the Signature Sender component. Select the template, assign contacts to roles, and click Send. No need to generate a document first.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Signers receive a branded email</strong> with a secure link to the signing page.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Signers review the fully merged document</strong> on a public Visualforce page — they see the actual record data, images, and child records, not a raw template.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Signers draw their signature</strong> on a canvas pad. Their signature and a timestamp are captured as an image.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>The signed PDF is generated</strong> — the template is merged with record data, signatures are stamped as images at the placeholder locations, and a PDF is rendered and saved to the record. All in one step, no DOCX intermediate.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>An audit trail</strong> records each signer's name, email, IP, browser, signed date, and a SHA-256 hash of the document.</li>
                    </ol>
                </div>

                <div class="slds-box slds-theme_shade slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Under the Hood: How We Beat Governor Limits</h3>
                    <p class="slds-var-m-bottom_small">Generating signed PDFs with images inside Apex's 6MB/12MB heap limits is widely considered impossible. Here's how DocGen does it:</p>
                    <ul class="slds-list_dotted">
                        <li class="slds-var-p-bottom_x-small"><strong>Pre-decomposed templates:</strong> When you save a template version, DocGen deconstructs the DOCX ZIP — extracting each XML part and embedded image into individual ContentVersion records. At generation time, we load raw XML strings and never touch the ZIP. ~75% heap savings.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Zero-heap images:</strong> For PDF output, image merge tags don't load image blobs into memory. We query only the ContentVersion ID, build a relative URL, and inject it into the HTML. <code>Blob.toPdf()</code> resolves the URL server-side. A 1.3MB image costs zero Apex heap.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>XML-level signature stamping:</strong> Signatures are injected as DrawingML XML fragments via string operations — no ZIP decompress/recompress cycle. Pure <code>String.replace()</code>.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Pre-computed preview:</strong> The admin's session pre-renders the document preview with public image URLs and caches it on the request record. Guest users load the preview from a regular field query — no Content sharing issues.</li>
                    </ul>
                    <p class="slds-var-m-top_small"><strong>Result:</strong> Signed PDFs with 20+ images (up to 30MB total image data) and 500+ child record rows, generated within governor limits.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Sending Signatures</h3>
                    <ol class="slds-list_ordered">
                        <li class="slds-var-p-bottom_x-small">On the record page, find the <strong>Signature Sender</strong> component.</li>
                        <li class="slds-var-p-bottom_x-small">Select <strong>DocGen Template</strong> mode (default) and choose your template from the dropdown. The system auto-detects signature role placeholders.</li>
                        <li class="slds-var-p-bottom_x-small">Add signers — for each signer, enter their name, email, and assign a role (must match a <code>&#123;#Signature_RoleName&#125;</code> placeholder in the template).</li>
                        <li class="slds-var-p-bottom_x-small">Optionally, use the <strong>Contact lookup</strong> to auto-fill name and email from a Contact record.</li>
                        <li class="slds-var-p-bottom_x-small">Click <strong>Generate Signature Links</strong>. Each signer receives their own unique, secure link via email.</li>
                    </ol>
                    <p class="slds-var-m-top_small slds-text-body_small slds-text-color_weak">You can also switch to <strong>Existing Document</strong> mode to send a pre-generated DOCX for signature (legacy flow).</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Tracking Status</h3>
                    <p class="slds-var-m-bottom_small">After sending, the Signature Sender component shows the status of each signer:</p>
                    <ul class="slds-list_dotted">
                        <li><strong>Pending</strong> — Email sent, signer hasn't opened the link yet.</li>
                        <li><strong>Viewed</strong> — Signer opened the signing page but hasn't signed yet.</li>
                        <li><strong>In Progress</strong> — Signer is actively on the signing page.</li>
                        <li><strong>Signed</strong> — Signer completed their signature.</li>
                    </ul>
                    <p class="slds-var-m-top_small">Once all signers have signed, the final PDF is generated with all signatures stamped in place.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Manual Signature Links</h3>
                    <p>After sending, you can copy the signature link for any signer directly. This is useful if you need to share the link through a different channel (e.g., Slack, text message) or if the email didn't arrive.</p>
                </div>

                <div class="slds-box slds-theme_default">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Document Authenticator</h3>
                    <p class="slds-var-m-bottom_small">DocGen includes a document verification tool that lets anyone verify a signed PDF's authenticity:</p>
                    <ul class="slds-list_dotted">
                        <li>Drop or upload a signed PDF file.</li>
                        <li>The system computes a SHA-256 hash of the file <strong>entirely in the browser</strong> — the file content is never uploaded to the server.</li>
                        <li>The hash is compared against the audit trail. If it matches, the signer details and signing timestamp are displayed.</li>
                    </ul>
                </div>
            </template>

            <!-- ==================== SIGNATURE ROLES & TEMPLATES ==================== -->
            <template if:true={isRoles}>
                <h2 class="slds-text-heading_large slds-var-m-bottom_medium">Signature Roles &amp; Templates</h2>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Understanding Roles</h3>
                    <p class="slds-var-m-bottom_small">Roles allow multiple people to sign the same document, each in a designated location. Every role maps to a placeholder in the Word template.</p>
                    <div class="slds-box slds-theme_shade slds-var-m-bottom_small">
                        <strong>Example:</strong> A contract template might have:<br/>
                        <code>&#123;#Signature_Client&#125;</code> — Where the client signs<br/>
                        <code>&#123;#Signature_Account_Executive&#125;</code> — Where the AE signs<br/>
                        <code>&#123;#Signature_Witness&#125;</code> — Where the witness signs
                    </div>
                    <p>When you send this document for signature, you assign each signer to one of these roles. The system scans your document and auto-detects available roles in the Signature Sender component.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Role Naming Rules</h3>
                    <ul class="slds-list_dotted">
                        <li class="slds-var-p-bottom_x-small">Role names follow the format <code>&#123;#Signature_RoleName&#125;</code> in the template.</li>
                        <li class="slds-var-p-bottom_x-small">Use underscores for multi-word roles: <code>&#123;#Signature_Account_Executive&#125;</code></li>
                        <li class="slds-var-p-bottom_x-small">Role names are case-sensitive and must match exactly between the template and the signer assignment.</li>
                        <li class="slds-var-p-bottom_x-small">For single-signer documents, still use a role: <code>&#123;#Signature_Signer&#125;</code> or <code>&#123;#Signature_Buyer&#125;</code>. This ensures consistent routing.</li>
                    </ul>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Signer Templates</h3>
                    <p class="slds-var-m-bottom_small">If you frequently send documents with the same set of signer roles, create a <strong>Signer Template</strong> to save time:</p>
                    <ol class="slds-list_ordered">
                        <li class="slds-var-p-bottom_x-small">In the Signature Sender, configure your signers and roles.</li>
                        <li class="slds-var-p-bottom_x-small">Click <strong>Save as Template</strong> and give it a name (e.g., "Standard Contract Signers").</li>
                        <li class="slds-var-p-bottom_x-small">Next time, select the template from the <strong>Load from Template</strong> dropdown. The roles are pre-populated — just fill in the contact details.</li>
                    </ol>
                </div>

                <div class="slds-box slds-theme_default">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Sort Order</h3>
                    <p>Signers are processed in the order defined by the <strong>Sort Order</strong> field on each signer role. This determines the sequence in which the system generates the final signed document. Lower numbers are processed first.</p>
                </div>
            </template>

            <!-- ==================== EMAIL BRANDING & COPY ==================== -->
            <template if:true={isEmail}>
                <h2 class="slds-text-heading_large slds-var-m-bottom_medium">Email Branding &amp; Copy</h2>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Overview</h3>
                    <p class="slds-var-m-bottom_small">When you send a document for e-signature, DocGen sends a branded HTML email to each signer. You can customize every visible element of these emails from the <strong>DocGen Setup</strong> tab.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Configurable Email Settings</h3>
                    <p class="slds-var-m-bottom_small">Navigate to the <strong>DocGen Setup</strong> tab and go to <strong>Step 2: Email Branding</strong>. You can customize:</p>
                    <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col">Setting</th>
                                <th scope="col">Description</th>
                                <th scope="col">Default</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><strong>Company Name</strong></td>
                                <td>Displayed in the email header when no logo URL is provided.</td>
                                <td>(blank)</td>
                            </tr>
                            <tr>
                                <td><strong>Logo Image URL</strong></td>
                                <td>URL to your company logo. Displayed in the email header bar. Recommended: 200x60px PNG with transparent background.</td>
                                <td>(blank — company name shown instead)</td>
                            </tr>
                            <tr>
                                <td><strong>Brand Color</strong></td>
                                <td>Hex color used for the email header bar and "Review &amp; Sign" CTA button.</td>
                                <td>#0176D3 (Salesforce blue)</td>
                            </tr>
                            <tr>
                                <td><strong>Email Subject Line</strong></td>
                                <td>Subject of the outbound email. Supports merge fields.</td>
                                <td>Action Required: Please Sign &#123;DocumentTitle&#125;</td>
                            </tr>
                            <tr>
                                <td><strong>Email Footer Text</strong></td>
                                <td>Custom footer text at the bottom of the email.</td>
                                <td>Powered by DocGen — Open-Source Document Generation for Salesforce</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Email Merge Fields</h3>
                    <p class="slds-var-m-bottom_small">The following merge fields are available in the <strong>Email Subject Line</strong>:</p>
                    <div class="slds-box slds-theme_shade">
                        <code>&#123;SignerName&#125;</code> — The name of the signer receiving the email<br/>
                        <code>&#123;DocumentTitle&#125;</code> — The title of the document being sent for signature<br/>
                        <code>&#123;SenderName&#125;</code> — The name of the Salesforce user who initiated the signature request
                    </div>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Email Structure (Not Configurable)</h3>
                    <p class="slds-var-m-bottom_small">The email body layout is fixed for consistency and deliverability. The structure includes:</p>
                    <ul class="slds-list_dotted">
                        <li><strong>Header bar</strong> — Brand color background with logo or company name.</li>
                        <li><strong>Greeting</strong> — "Hi [Signer Name],"</li>
                        <li><strong>Message</strong> — "[Sender Name] has sent you a document that requires your signature."</li>
                        <li><strong>Document info box</strong> — Shows document title and signer role (if multi-signer).</li>
                        <li><strong>CTA button</strong> — "Review &amp; Sign Document" (links to the signing page).</li>
                        <li><strong>Security note</strong> — "This link is unique to you and will expire in 30 days."</li>
                        <li><strong>Fallback URL</strong> — Plain text URL in case the button doesn't render.</li>
                        <li><strong>Footer</strong> — Your custom footer text or the default.</li>
                    </ul>
                </div>

                <div class="slds-box slds-theme_shade">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Email Deliverability Tips</h3>
                    <ul class="slds-list_dotted">
                        <li>Emails are sent from the Salesforce org's configured email address (via <code>Messaging.sendEmail</code>).</li>
                        <li>If a signer is linked to a Contact record, the email uses <code>setTargetObjectId</code> for proper activity tracking.</li>
                        <li>Ensure your org's email deliverability setting is set to <strong>"All Email"</strong> (Setup &gt; Deliverability).</li>
                        <li>In sandbox environments, emails are only sent to verified addresses by default.</li>
                    </ul>
                </div>
            </template>

            <!-- ==================== LOGO & IMAGES ==================== -->
            <template if:true={isLogo}>
                <h2 class="slds-text-heading_large slds-var-m-bottom_medium">Logo &amp; Images</h2>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Email Logo Setup</h3>
                    <p class="slds-var-m-bottom_small">The logo appears at the top of every signature request email. To configure it:</p>
                    <ol class="slds-list_ordered">
                        <li class="slds-var-p-bottom_x-small">Go to the <strong>DocGen Setup</strong> tab.</li>
                        <li class="slds-var-p-bottom_x-small">In <strong>Step 2: Email Branding</strong>, enter the <strong>Logo Image URL</strong>.</li>
                        <li class="slds-var-p-bottom_x-small">Recommended dimensions: <strong>200x60px</strong>, PNG with transparent background.</li>
                        <li class="slds-var-p-bottom_x-small">Click <strong>Save Email Settings</strong>.</li>
                    </ol>
                </div>

                <div class="slds-box slds-theme_warning slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Logo Hosting: Important Notes</h3>
                    <p class="slds-var-m-bottom_small">The logo URL must be publicly accessible for email clients to render it. Here are your options:</p>

                    <h4 class="slds-text-title_bold slds-var-m-top_small slds-var-m-bottom_x-small">Option 1: External Hosting (Recommended for Emails)</h4>
                    <p class="slds-var-m-bottom_small">Host your logo on a public web server, CDN, or service like your company website. The image URL should start with <code>https://</code>. Email clients (Gmail, Outlook, etc.) will fetch and display the image directly.</p>
                    <p class="slds-var-m-bottom_small"><strong>Example:</strong> <code>https://www.yourcompany.com/assets/logo.png</code></p>

                    <h4 class="slds-text-title_bold slds-var-m-top_small slds-var-m-bottom_x-small">Option 2: Salesforce-Hosted (Static Resource or ContentVersion)</h4>
                    <p class="slds-var-m-bottom_small">You can upload the logo as a Salesforce Static Resource or as a File (ContentVersion) and use its URL. However:</p>
                    <ul class="slds-list_dotted slds-var-m-bottom_small">
                        <li>Salesforce-hosted URLs require authentication — email clients <strong>will not render the image</strong> in the recipient's inbox.</li>
                        <li>The image <strong>will still render</strong> if the recipient clicks through to the signing page (which runs in a browser with access).</li>
                        <li>For the best email experience, use an externally hosted URL.</li>
                    </ul>

                    <h4 class="slds-text-title_bold slds-var-m-top_small slds-var-m-bottom_x-small">Option 3: Salesforce Site-Hosted</h4>
                    <p class="slds-var-m-bottom_small">If you have a Salesforce Site configured (for e-signatures), you can host the logo as a Static Resource and reference it via the Site URL:</p>
                    <p class="slds-var-m-bottom_small"><code>https://yourdomain.my.salesforce-sites.com/resource/YourLogo</code></p>
                    <p>This approach makes the image publicly accessible (via the Site) so email clients can render it. No Remote Site Setting is needed for this since it's on Salesforce's domain.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Remote Site Settings</h3>
                    <p class="slds-var-m-bottom_small">If your logo is hosted on a domain <strong>outside of Salesforce</strong> and you want Salesforce server-side processes to fetch or validate the image, you need a Remote Site Setting:</p>
                    <ol class="slds-list_ordered">
                        <li>Go to <strong>Setup &gt; Remote Site Settings</strong>.</li>
                        <li>Click <strong>New Remote Site</strong>.</li>
                        <li>Enter a name (e.g., "Company Logo Host").</li>
                        <li>Enter the Remote Site URL (e.g., <code>https://www.yourcompany.com</code>).</li>
                        <li>Check <strong>Active</strong> and save.</li>
                    </ol>
                    <p class="slds-var-m-top_small slds-text-body_small slds-text-color_weak"><strong>Note:</strong> For email logos, a Remote Site Setting is typically <strong>not required</strong> because the email client (Gmail, Outlook) fetches the image directly — Salesforce never makes a server-side callout to the logo URL. Remote Site Settings are only needed if a future feature requires Salesforce to fetch the image server-side.</p>
                </div>

                <div class="slds-box slds-theme_default">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Images in Generated Documents</h3>
                    <p class="slds-var-m-bottom_small">Images can appear in generated documents in several ways:</p>
                    <ul class="slds-list_dotted">
                        <li class="slds-var-p-bottom_x-small"><strong>Template images</strong> — Logos, watermarks, or other images placed directly in your .docx/.pptx file are preserved in the output. They are extracted and stored as ContentVersions linked to the template version for reliable rendering.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Rich Text field images</strong> — Images in Rich Text Area fields (e.g., a photo uploaded to a Description field) are automatically resolved and embedded. Salesforce-hosted image URLs are converted to absolute URLs for rendering.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>Signature images</strong> — Drawn signatures are captured as PNG images and stamped into the document at the placeholder location.</li>
                    </ul>
                </div>
            </template>

            <!-- ==================== SHARING & PERMISSIONS ==================== -->
            <template if:true={isSharing}>
                <h2 class="slds-text-heading_large slds-var-m-bottom_medium">Sharing &amp; Permissions</h2>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Template Sharing</h3>
                    <p class="slds-var-m-bottom_small">By default, templates are visible based on org-wide defaults. To share specific templates with users or groups:</p>
                    <ol class="slds-list_ordered">
                        <li>In the Template Manager, click the row actions menu on a template and choose <strong>Share</strong>.</li>
                        <li>Search for a user or public group.</li>
                        <li>Select the access level: <strong>Read Only</strong> or <strong>Read/Write</strong>.</li>
                        <li>Click <strong>Share</strong>.</li>
                    </ol>
                    <p class="slds-text-body_small slds-text-color_weak">Sharing rules are managed via manual sharing (DocGen_Template__Share). The template owner always has full access.</p>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Permission Set Details</h3>
                    <ul class="slds-list_dotted">
                        <li class="slds-var-p-bottom_x-small"><strong>DocGen Admin</strong> — Full CRUD on all objects. Can manage templates, versions, sharing, settings, and view all audit records. Has modifyAllRecords and viewAllRecords on DocGen objects.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>DocGen User</strong> — Can create and generate documents. Read-only on templates and versions. Can create own signature requests and view audit trail. Cannot modify templates or access setup.</li>
                        <li class="slds-var-p-bottom_x-small"><strong>DocGen Guest Signature</strong> — Minimal access for the Salesforce Site guest user. Can read signature request/signer records (to validate tokens) and create audit trail entries. Cannot read or modify templates, settings, or other records.</li>
                    </ul>
                </div>

                <div class="slds-box slds-theme_shade">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Security Architecture</h3>
                    <ul class="slds-list_dotted">
                        <li class="slds-var-p-bottom_x-small">All controller classes use <code>with sharing</code> to enforce sharing rules, except signature classes that must support guest user access (<code>without sharing</code> with token-based authentication).</li>
                        <li class="slds-var-p-bottom_x-small">CRUD/FLS enforcement uses a mix of <code>WITH USER_MODE</code> (for user-context queries) and <code>Security.stripInaccessible()</code> (for DML operations).</li>
                        <li class="slds-var-p-bottom_x-small">Dynamic SOQL in the data retriever validates all field names against the Schema before inclusion in queries.</li>
                        <li class="slds-var-p-bottom_x-small">Guest user signature tokens are SHA-256 hashes with a 30-day expiration window.</li>
                        <li class="slds-var-p-bottom_x-small">No HTTP callouts or session ID usage — fully self-contained on the Salesforce platform.</li>
                    </ul>
                </div>
            </template>

            <!-- ==================== DATA MODEL ==================== -->
            <template if:true={isDataModel}>
                <h2 class="slds-text-heading_large slds-var-m-bottom_medium">Data Model</h2>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">Document Generation Objects</h3>
                    <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col"><div class="slds-truncate">Object</div></th>
                                <th scope="col"><div class="slds-truncate">API Name</div></th>
                                <th scope="col"><div class="slds-truncate">Purpose</div></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td><strong>DocGen Template</strong></td><td><code>DocGen_Template__c</code></td><td>Stores template configuration: name, type (Word/PowerPoint), output format (Native/PDF), base object, query config, and document title format.</td></tr>
                            <tr><td><strong>DocGen Template Version</strong></td><td><code>DocGen_Template_Version__c</code></td><td>Snapshot of a template at a point in time. Tracks the file (ContentVersion ID), query config, and active status. Only one version is active at a time.</td></tr>
                            <tr><td><strong>DocGen Job</strong></td><td><code>DocGen_Job__c</code></td><td>Tracks bulk generation jobs. Records the template, query condition, status (Processing/Completed/Failed), and success/error counts.</td></tr>
                            <tr><td><strong>Saved DocGen Query</strong></td><td><code>DocGen_Saved_Query__c</code></td><td>Reusable filter conditions for bulk generation. Linked to a template via master-detail.</td></tr>
                            <tr><td><strong>DocGen Settings</strong></td><td><code>DocGen_Settings__c</code></td><td>Hierarchy custom setting for org/profile/user-level config: Experience Site URL, email branding (subject, logo, footer, brand color, message), and company name.</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-var-m-bottom_small">E-Signature Objects</h3>
                    <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col"><div class="slds-truncate">Object</div></th>
                                <th scope="col"><div class="slds-truncate">API Name</div></th>
                                <th scope="col"><div class="slds-truncate">Purpose</div></th>
                            </tr>
                        </thead>
                        <tbody>
