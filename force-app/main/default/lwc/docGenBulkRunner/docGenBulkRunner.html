<template>
    <div class="app-workspace">
        <div class="workspace-header">
            <div>
                <h2>Bulk Document Generation</h2>
                <p>Automate thousands of documents in the background based on a template and a filter.</p>
            </div>
            <lightning-icon icon-name="standard:record_create" size="medium"></lightning-icon>
        </div>

        <div class="workspace-content">
            <!-- Step 1: Configuration -->
            <div class="slds-grid slds-gutters_large">
                <div class="slds-col slds-size_1-of-2">
                    <h3 class="section-title">Step 1: Select Template</h3>
                    <div style="position: relative;">
                        <div class="slds-grid slds-grid_vertical-align-end" style="gap: 0.5rem;">
                            <div class="slds-col slds-grow">
                                <lightning-input type="search" label="Search Templates" variant="label-hidden" placeholder="Start typing to find a template..." value={templateSearchTerm} onchange={handleTemplateSearch} onfocus={handleTemplateSearchFocus} disabled={isProcessing}></lightning-input>
                            </div>
                            <lightning-button-icon icon-name="utility:refresh" variant="border-filled" alternative-text="Refresh templates" onclick={handleRefreshTemplates}></lightning-button-icon>
                        </div>
                        <template if:true={showTemplateDropdown}>
                            <div class="slds-dropdown slds-dropdown_fluid custom-dropdown">
                                <ul class="slds-listbox slds-listbox_vertical">
                                    <template for:each={filteredTemplates} for:item="tmpl">
                                        <li key={tmpl.value} class="slds-listbox__item">
                                            <div class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small" style="cursor: pointer;" data-id={tmpl.value} onclick={handleTemplateSelect}>
                                                <span class="slds-media__figure"><lightning-icon icon-name="standard:template" size="x-small"></lightning-icon></span>
                                                <span class="slds-media__body"><span class="slds-truncate">{tmpl.label}</span></span>
                                            </div>
                                        </li>
                                    </template>
                                    <template if:false={filteredTemplates.length}>
                                        <li class="slds-listbox__item"><div class="slds-var-p-around_small slds-text-color_weak slds-text-align_center">No templates found</div></li>
                                    </template>
                                </ul>
                            </div>
                        </template>
                    </div>

                    <template if:true={selectedTemplateName}>
                        <div class="selection-badge slds-var-m-top_small">
                            <lightning-icon icon-name="utility:check" size="xx-small" variant="success"></lightning-icon>
                            <span><strong>{selectedTemplateName}</strong> — {baseObject}</span>
                        </div>
                    </template>

                </div>

                <div class="slds-col slds-size_1-of-2">
                     <!-- Sample Record (when template selected and no active job) -->
                     <template if:true={selectedTemplateId}>
                         <template if:false={jobId}>
                             <div class="info-card">
                                 <h4 class="slds-text-title_bold slds-var-m-bottom_x-small">Preview Sample Record</h4>
                                 <p class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_small">Pick a record to preview what your document will look like before running the bulk job.</p>
                                 <template if:true={baseObject}>
                                     <lightning-record-picker
                                         label="Sample Record"
                                         variant="label-hidden"
                                         object-api-name={baseObject}
                                         value={sampleRecordId}
                                         onchange={handleSampleRecordChange}
                                         placeholder="Search for a record...">
                                     </lightning-record-picker>
                                 </template>
                                 <template if:true={sampleRecordId}>
                                     <lightning-button label="Preview Sample PDF" variant="brand" icon-name="utility:download" size="small" onclick={handlePreviewSample} disabled={isGeneratingPreview} class="slds-var-m-top_small slds-show"></lightning-button>
                                     <template if:true={isGeneratingPreview}>
                                         <lightning-spinner alternative-text="Generating..." size="small" class="slds-var-m-left_small"></lightning-spinner>
                                     </template>
                                 </template>
                             </div>
                         </template>
                     </template>

                     <!-- Job Status Monitor -->
                     <template if:true={jobId}>
                        <div class="status-card">
                            <div class="slds-grid slds-grid_align-spread slds-var-m-bottom_small">
                                <h3 class="slds-text-heading_small slds-text-color_inverse">Batch Job Status</h3>
                                <lightning-badge label={jobStatus} class={jobStatusVariant}></lightning-badge>
                            </div>
                            <div class="slds-var-m-bottom_small slds-text-color_inverse">
                                <div class="slds-grid slds-grid_align-spread">
                                    <span>Success:</span>
                                    <span><strong>{jobProgress.success}</strong></span>
                                </div>
                                <div class="slds-grid slds-grid_align-spread">
                                    <span>Errors:</span>
                                    <span><strong>{jobProgress.error}</strong></span>
                                </div>
                                <div class="slds-grid slds-grid_align-spread">
                                    <span>Total:</span>
                                    <span><strong>{jobProgress.total}</strong></span>
                                </div>
                            </div>

                            <template if:true={isProcessing}>
                                <div class="slds-var-m-top_small">
                                    <lightning-progress-bar value={jobProgress.percent} variant="circular"></lightning-progress-bar>
                                    <div class="slds-grid slds-grid_align-spread slds-var-m-top_x-small slds-text-color_inverse">
                                        <p class="slds-text-body_small" style="opacity: 0.8;">Auto-refreshing every 5s...</p>
                                        <button class="transparent-btn" onclick={pollJob}>Refresh Now</button>
                                    </div>
                                </div>
                            </template>

                            <template if:true={isJobFinished}>
                                <div class="slds-var-m-top_small slds-grid slds-gutters_x-small">
                                    <div class="slds-col">
                                        <lightning-button
                                            label="Start New Job"
                                            icon-name="utility:add"
                                            variant="inverse"
                                            onclick={handleNewJob}
                                            class="slds-size_full">
                                        </lightning-button>
                                    </div>
                                    <div class="slds-col">
                                        <lightning-button
                                            label="View Job"
                                            icon-name="utility:open"
                                            variant="base"
                                            data-jobid={jobId}
                                            onclick={handleViewJob}
                                            class="slds-size_full"
                                            style="color: white;">
                                        </lightning-button>
                                    </div>
                                </div>
                            </template>
                        </div>
                     </template>
                </div>
            </div>

            <template if:true={baseObject}>
                <div class="divider"></div>
                <h3 class="section-title">Step 2: Record Filter (SOQL)</h3>
                <p class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_medium">Define a SOQL WHERE clause to select records. Leave empty to process ALL records.</p>

                <lightning-textarea
                    label="SOQL Condition"
                    variant="label-hidden"
                    value={condition}
                    onchange={handleConditionChange}
                    placeholder="e.g. StageName = 'Closed Won'"
                    disabled={isProcessing}
                    class="code-textarea">
                </lightning-textarea>

                <div class="slds-grid slds-gutters_large slds-var-m-top_medium">
                    <!-- Left: Examples -->
                    <div class="slds-col slds-size_1-of-2">
                         <div class="info-card">
                            <p class="slds-text-title_bold slds-var-m-bottom_x-small">Quick Examples</p>
                            <ul class="slds-list_dotted slds-text-body_small slds-text-color_weak">
                                <li>Simple: <code class="inline-code">StageName = 'Closed Won'</code></li>
                                <li>Grouped: <code class="inline-code">(Type = 'Customer' OR Industry = 'Energy') AND AnnualRevenue > 1000000</code></li>
                                <li>Subquery: <code class="inline-code">AccountId IN (SELECT Id FROM Account WHERE BillingState = 'CA')</code></li>
                            </ul>
                        </div>
                    </div>

                    <!-- Right: Saved Queries -->
                    <div class="slds-col slds-size_1-of-2">
                        <div class="info-card bg-white">
                            <div class="slds-grid slds-grid_align-spread slds-var-m-bottom_small">
                                <h4 class="slds-text-title_bold">Saved Queries</h4>
                                <button class="text-link" onclick={openSaveModal}>Save Current</button>
                            </div>
                            <template if:false={savedQueries.length}>
                                <p class="slds-text-color_weak slds-text-body_small">No saved queries for this template.</p>
                            </template>
                            <ul class="query-list">
                                <template for:each={savedQueries} for:item="q">
                                    <li key={q.Id}>
                                        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                            <div class="slds-truncate" title={q.Description__c}>
                                                <a onclick={handleLoadQuery} data-id={q.Id} class="text-link">{q.Name}</a>
                                            </div>
                                            <button class="delete-icon" onclick={handleDeleteQuery} data-id={q.Id} title="Delete query">&times;</button>
                                        </div>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="slds-var-m-top_medium slds-grid slds-grid_vertical-align-center" style="gap: 1rem;">
                    <lightning-button
                        label="Validate Filter"
                        onclick={handleValidate}
                        disabled={isProcessing}
                        variant="neutral">
                    </lightning-button>

                    <template if:true={recordCount}>
                         <div class="record-count-badge">
                            <lightning-icon icon-name="utility:success" size="xx-small" variant="inverse" class="slds-var-m-right_xx-small"></lightning-icon>
                            {recordCount} Records Found
                         </div>
                    </template>
                    <template if:false={recordCount}>
                         <template if:true={isValidating}>
                             <span class="slds-text-color_weak slds-text-body_small">Validating...</span>
                         </template>
                    </template>
                </div>

                <div class="divider"></div>
                <h3 class="section-title">Step 3: Run Generation</h3>
                <div class="run-bar slds-var-m-top_medium slds-grid slds-grid_align-center slds-grid_vertical-align-end slds-gutters_small">
                    <div class="slds-col slds-size_1-of-3">
                        <lightning-input
                            label="Job Name (optional)"
                            value={jobLabel}
                            onchange={handleJobLabelChange}
                            placeholder="e.g. March Receipts"
                            disabled={isProcessing}>
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-6">
                        <lightning-input
                            type="number"
                            label="Batch Size"
                            value={batchSize}
                            onchange={handleBatchSizeChange}
                            min="1"
                            max="200"
                            disabled={isProcessing}
                            field-level-help="Records per transaction. Use 1 for complex templates. Higher values (10-50) for simple text-only templates.">
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-var-p-top_large">
                        <lightning-input
                            type="checkbox"
                            label="Merge PDFs"
                            checked={mergePdf}
                            onchange={handleMergePdfChange}
                            disabled={isProcessing}>
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-var-p-top_large">
                        <lightning-input
                            type="checkbox"
                            label="Merge Only"
                            checked={mergeOnly}
                            onchange={handleMergeOnlyChange}
                            disabled={isProcessing}>
                        </lightning-input>
                    </div>

                    <!-- Heap Estimate -->
                    <template if:true={mergePdf}>
                        <div class="slds-col slds-size_full slds-var-m-top_small slds-var-p-left_small">
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <template if:true={isEstimatingHeap}>
                                    <lightning-spinner alternative-text="Estimating heap..." size="xx-small" variant="brand" class="slds-is-relative slds-var-m-right_small"></lightning-spinner>
                                    <span class="slds-text-body_small slds-text-color_weak">Estimating heap usage...</span>
                                </template>
                                <template if:false={isEstimatingHeap}>
                                    <template if:true={heapEstimate}>
                                        <lightning-icon icon-name={heapIconName} size="xx-small" variant={heapIconVariant} class="slds-var-m-right_xx-small"></lightning-icon>
                                        <span class={heapMessageClass}>{heapEstimate.message}</span>
                                    </template>
                                </template>
                            </div>
                        </div>
                    </template>

                    <div class="slds-col slds-var-m-top_small">
                        <lightning-button
                            label="Run Bulk Generation"
                            variant="brand"
                            onclick={handleRun}
                            disabled={isRunDisabled}>
                        </lightning-button>
                    </div>
                </div>
            </template>

            <!-- Recent Jobs History -->
            <template lwc:if={recentJobs.length}>
                <div class="divider"></div>
                <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-end slds-var-m-bottom_medium">
                    <h3 class="section-title" style="margin: 0;">Recent Jobs</h3>
                    <div class="slds-size_1-of-4">
                        <lightning-input
                            type="search"
                            label="Search Jobs"
                            variant="label-hidden"
                            placeholder="Search jobs..."
                            value={jobSearchTerm}
                            onchange={handleJobSearchChange}>
                        </lightning-input>
                    </div>
                </div>
                <div class="history-container">
                    <template for:each={filteredRecentJobs} for:item="rj">
                        <div key={rj.id} class="history-row clickable-row" data-jobid={rj.id} onclick={handleViewJob}>
                            <div class="slds-col slds-size_5-of-12">
                                <lightning-badge label={rj.status}></lightning-badge>
                                <span class="slds-text-body_small slds-var-m-left_small"><strong>{rj.displayName}</strong></span>
                                <template lwc:if={rj.label}>
                                    <span class="slds-text-body_small slds-text-color_weak slds-var-m-left_x-small">({rj.templateName})</span>
                                </template>
                                <template lwc:if={rj.isRunning}>
                                    <lightning-spinner alternative-text="Running" size="xx-small" class="slds-var-m-left_small"></lightning-spinner>
                                </template>
                            </div>
                            <div class="slds-col slds-text-align_right slds-text-body_small">
                                <span class="slds-text-color_success">{rj.success}</span> / {rj.total}
                                <template lwc:if={rj.error}><span class="slds-text-color_error slds-var-m-left_x-small">({rj.error} errors)</span></template>
                                <span class="slds-text-color_weak slds-var-m-left_medium">{rj.date}</span>
                                <lightning-button-icon
                                    icon-name="utility:open"
                                    alternative-text="View Job"
                                    title="View Job Record"
                                    variant="bare"
                                    size="small"
                                    class="slds-var-m-left_medium">
                                </lightning-button-icon>
                            </div>
                        </div>
                    </template>
                    <template lwc:if={hasNoSearchResults}>
                        <p class="slds-text-body_small slds-text-color_weak slds-var-p-around_medium">No jobs match your search.</p>
                    </template>
                </div>
            </template>
        </div>
    </div>

    <!-- Save Query Modal -->
    <template if:true={isSaveModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container modern-modal">
                <header class="slds-modal__header">
                    <lightning-button-icon icon-name="utility:close" alternative-text="Close" title="Close" variant="bare" class="slds-modal__close" onclick={closeSaveModal}></lightning-button-icon>
                    <h2 class="slds-text-heading_medium slds-hyphenate">Save Query Filter</h2>
                </header>
                <div class="slds-modal__content slds-var-p-around_large">
                    <lightning-input label="Filter Name" value={newQueryName} onchange={handleNewQueryNameChange} required></lightning-input>
                    <lightning-input label="Description" value={newQueryDesc} onchange={handleNewQueryDescChange} class="slds-var-m-top_small"></lightning-input>
                    <div class="info-card slds-var-m-top_large">
                        <p class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_xx-small">Condition to save:</p>
                        <code class="inline-code">{condition}</code>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeSaveModal} class="slds-var-m-right_small" variant="neutral"></lightning-button>
                    <lightning-button label="Save Filter" variant="brand" onclick={handleSaveQuery}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
