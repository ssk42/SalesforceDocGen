<template>
    <lightning-card title="DocGen Secure E-Signature Setup" icon-name="custom:custom108">
        <div class="slds-var-p-around_medium">
            <template if:false={isLoaded}>
                <div class="slds-is-relative" style="height: 100px;">
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </div>
            </template>

            <template if:true={isLoaded}>
                <!-- Introduction Banner -->
                <div class="slds-notify slds-notify_alert slds-theme_info slds-var-m-bottom_large" role="alert">
                    <span class="slds-assistive-text">info</span>
                    <h2>Public E-Signatures require a secure API Loopback to generate background PDFs. Complete these steps to configure the OAuth integration and Salesforce Site so Guest Users can sign documents securely.</h2>
                </div>

                <!-- Progress Bar -->
                <lightning-progress-indicator current-step={currentStep} type="path" variant="base" class="slds-var-m-bottom_large">
                    <lightning-progress-step label="1. External Client App" value="1" onclick={handleStepClick}></lightning-progress-step>
                    <lightning-progress-step label="2. Provision & Authenticate" value="2" onclick={handleStepClick}></lightning-progress-step>
                    <lightning-progress-step label="3. Salesforce Site" value="3" onclick={handleStepClick}></lightning-progress-step>
                </lightning-progress-indicator>

                <!-- Step 1: External Client App (manual) -->
                <template if:true={isStep1}>
                    <div class="slds-box slds-theme_default">
                        <h2 class="slds-text-heading_medium slds-var-m-bottom_small">Step 1: Create the External Client App</h2>
                        <ol class="slds-list_ordered slds-var-m-left_medium slds-var-m-bottom_medium slds-text-body_regular">
                            <li>Go to <strong>Setup</strong> and search for <strong>External Client App Manager</strong>.</li>
                            <li>Click <strong>Create New External Client App</strong>.</li>
                            <li>Name it: <strong>DocGen Loopback</strong>, Contact Email: your email. Set Distribution State to <strong>Local</strong>.</li>
                            <li>Go to the <strong>API (Enable OAuth Settings)</strong> section and check <strong>Enable OAuth</strong>.</li>
                            <li>Set the Callback URL to exactly:<br/>
                                <div class="slds-box slds-theme_shade slds-var-m-top_xx-small slds-var-m-bottom_small"><strong>{callbackUrl}</strong></div>
                            </li>
                            <li>Add the <strong>"Manage user data via APIs (api)"</strong> scope and <strong>"Perform requests at any time (refresh_token, offline_access)"</strong> scope.</li>
                            <li>Uncheck <strong>Require Proof Key for Code Exchange (PKCE)</strong> and save.</li>
                            <li>Reopen the app, go to the <strong>Settings</strong> tab, scroll to <strong>OAuth Settings</strong>, and click <strong>Consumer Key and Secret</strong>. Copy them somewhere safe.</li>
                        </ol>
                        <lightning-button variant="brand" label="Next Step" onclick={nextStep}></lightning-button>
                    </div>
                </template>

                <!-- Step 2: Provision & Authenticate (automated) -->
                <template if:true={isStep2}>
                    <div class="slds-box slds-theme_default">
                        <h2 class="slds-text-heading_medium slds-var-m-bottom_small">Step 2: Provision OAuth Credentials</h2>
                        <p class="slds-text-body_regular slds-var-m-bottom_medium">Enter the Consumer Key and Secret from your External Client App. This will automatically create the Auth Provider, External Credential, and Named Credential.</p>

                        <div class="slds-form-element slds-var-m-bottom_small">
                            <lightning-input
                                type="text"
                                label="Consumer Key"
                                value={consumerKey}
                                onchange={handleConsumerKeyChange}
                                required
                                disabled={isProvisioning}>
                            </lightning-input>
                        </div>
                        <div class="slds-form-element slds-var-m-bottom_medium">
                            <lightning-input
                                type="password"
                                label="Consumer Secret"
                                value={consumerSecret}
                                onchange={handleConsumerSecretChange}
                                required
                                disabled={isProvisioning}>
                            </lightning-input>
                        </div>

                        <!-- Provision Button -->
                        <template if:false={provisionSucceeded}>
                            <lightning-button
                                variant="brand"
                                label="Provision Credentials"
                                onclick={handleProvision}
                                disabled={isProvisionDisabled}
                                class="slds-var-m-bottom_medium">
                            </lightning-button>
                        </template>

                        <!-- Provisioning Spinner -->
                        <template if:true={isProvisioning}>
                            <div class="slds-is-relative slds-var-m-vertical_medium" style="height: 60px;">
                                <lightning-spinner alternative-text="Deploying credentials..." size="small"></lightning-spinner>
                            </div>
                            <p class="slds-text-body_small slds-text-color_weak slds-align_absolute-center">Deploying Auth Provider, External Credential, and Named Credential...</p>
                        </template>

                        <!-- Error Banner -->
                        <template if:true={provisionError}>
                            <div class="slds-notify slds-notify_alert slds-theme_error slds-var-m-vertical_medium" role="alert">
                                <h2>Provision failed: {provisionError}</h2>
                            </div>
                        </template>

                        <!-- Success Banner + Authenticate Instructions -->
                        <template if:true={provisionSucceeded}>
                            <div class="slds-notify slds-notify_alert slds-theme_success slds-var-m-vertical_medium" role="alert">
                                <h2>Credentials provisioned successfully!</h2>
                            </div>

                            <div class="slds-notify slds-notify_alert slds-theme_warning slds-var-m-bottom_medium" role="alert">
                                <h2>Wait up to 10 minutes before authenticating. Salesforce needs time to propagate the External Client App credentials.</h2>
                            </div>

                            <div class="slds-box slds-theme_shade slds-var-m-bottom_medium">
                                <h3 class="slds-text-heading_small slds-var-m-bottom_small">Now Authenticate the Connection:</h3>
                                <ol class="slds-list_ordered slds-var-m-left_medium slds-text-body_regular">
                                    <li>Go to <strong>Setup > Named Credentials</strong> and select the <strong>External Credentials</strong> tab.</li>
                                    <li>Click <strong>DocGen Loopback Auth.</strong> to open it.</li>
                                    <li>In the <strong>Principals</strong> section, click the dropdown arrow next to <strong>Admin</strong> and select <strong>Authenticate</strong>.</li>
                                    <li>Follow the prompts and click <strong>Allow</strong> to establish the connection.</li>
                                </ol>
                            </div>

                            <div class="slds-box slds-theme_shade slds-var-m-bottom_medium">
                                <h3 class="slds-text-heading_small slds-var-m-bottom_small">Grant Permission Set Access to the External Credential:</h3>
                                <ol class="slds-list_ordered slds-var-m-left_medium slds-text-body_regular">
                                    <li>Go to <strong>Setup > Permission Sets</strong> and open <strong>DocGen Admin</strong>.</li>
                                    <li>Click <strong>External Credential Principal Access</strong>.</li>
                                    <li>Click <strong>Edit</strong>, add <strong>DocGen Loopback Auth. - Admin</strong>, and save.</li>
                                    <li>Repeat for the <strong>DocGen User</strong> permission set.</li>
                                </ol>
                            </div>
                        </template>

                        <div class="slds-var-m-top_medium">
                            <lightning-button label="Back" onclick={prevStep} class="slds-var-m-right_small"></lightning-button>
                            <template if:true={provisionSucceeded}>
                                <lightning-button variant="brand" label="Next Step" onclick={nextStep}></lightning-button>
                            </template>
                        </div>
                    </div>

                    <!-- Hidden iframe for VF page metadata deploy -->
                    <iframe src={provisionPageUrl} class="slds-hide" title="Provision Engine"></iframe>
                </template>

                <!-- Step 3: Salesforce Site -->
                <template if:true={isStep3}>
                    <div class="slds-box slds-theme_default">
                        <h2 class="slds-text-heading_medium slds-var-m-bottom_small">Step 3: Salesforce Site Configuration</h2>
                        <ol class="slds-list_ordered slds-var-m-left_medium slds-var-m-bottom_medium slds-text-body_regular">
                            <li>Go to <strong>Setup &gt; Sites</strong> (search "Sites" in Quick Find).</li>
                            <li>If you don't have a Sites domain registered, register one (e.g., <strong>docgen</strong>).</li>
                            <li>Click <strong>New</strong> to create a new site:
                                <ul class="slds-list_dotted slds-var-m-left_medium">
                                    <li>Site Label: <strong>DocGen Signatures</strong></li>
                                    <li>Active Site Home Page: <strong>DocGenSignature</strong></li>
                                    <li>Check <strong>Active</strong></li>
                                </ul>
                            </li>
                            <li>After saving, click <strong>Public Access Settings</strong> on the Site detail page.</li>
                            <li>In the Guest User profile, go to <strong>Enabled Visualforce Page Access</strong> and add <strong>DocGenSignature</strong>.</li>
                            <li>Assign the <strong>DocGen Guest Signature</strong> permission set to the Site Guest User.</li>
                            <li>Copy the <strong>Site URL</strong> from the Site detail page and paste it below.</li>
                        </ol>

                        <div class="slds-form-element slds-var-m-bottom_medium">
                            <lightning-input
                                type="url"
                                label="Salesforce Site Base URL"
                                placeholder="https://docgen.my.salesforce-sites.com"
                                value={experienceSiteUrl}
                                onchange={handleUrlChange}
                                required>
                            </lightning-input>
                            <p class="slds-text-body_small slds-var-m-top_xx-small">Base URL only, no path. Example: https://docgen.my.salesforce-sites.com</p>
                        </div>

                        <div class="slds-notify slds-notify_alert slds-theme_success slds-var-m-bottom_medium" role="alert">
                            <h2>Configuration Complete! E-Signatures are ready for production.</h2>
                        </div>

                        <lightning-button label="Back" onclick={prevStep} class="slds-var-m-right_small"></lightning-button>
                        <lightning-button variant="brand" label="Save Settings" onclick={handleSaveSettings}></lightning-button>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
